<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>عبید گرافکس — ایڈمن پینل</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#050d1a; --navy-2:#091427; --navy-card:#0b1a30; --sky:#38bdf8; --royal:#2563eb;
  --silver:#c8d6e5; --white:#f0f6ff; --muted:#6b89aa; --border:rgba(56,189,248,.15);
  --radius:12px; --green:#22c55e; --red:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--silver);min-height:100vh;}
.urdu{font-family:'Noto Nastaliq Urdu',serif;}
button{cursor:pointer;border:none;font-family:inherit;}
input,textarea,select{font-family:inherit;}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--navy-card);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem;width:320px;text-align:center;}
.login-box .lm{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--royal),var(--sky));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;margin:0 auto 1rem;font-size:1.3rem;}
.login-box h2{color:var(--white);margin-bottom:.3rem;font-size:1.2rem;}
.login-box p{font-size:.8rem;color:var(--muted);margin-bottom:1.5rem;}
.login-box input{width:100%;background:var(--navy-2);border:1px solid var(--border);border-radius:8px;padding:.7rem .9rem;color:var(--white);margin-bottom:.8rem;font-size:.9rem;}
.login-box button{width:100%;background:linear-gradient(135deg,var(--royal),var(--sky));color:#fff;padding:.7rem;border-radius:8px;font-weight:600;font-size:.9rem;}
.login-err{color:var(--red);font-size:.78rem;margin-top:.6rem;min-height:1em;}

/* SHELL */
#adminShell{display:none;min-height:100vh;}
#sidebar{width:240px;background:var(--navy-2);border-left:1px solid var(--border);padding:1.3rem 1rem;position:fixed;top:0;bottom:0;right:0;overflow-y:auto;}
.sb-brand{display:flex;align-items:center;gap:.6rem;margin-bottom:1.6rem;padding:0 .3rem;}
.sb-brand .lm{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--royal),var(--sky));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:.85rem;flex-shrink:0;}
.sb-brand div b{color:var(--white);font-size:.92rem;display:block;}
.sb-brand div span{color:var(--muted);font-size:.7rem;}
.nav-item{display:flex;align-items:center;gap:.65rem;padding:.7rem .8rem;border-radius:8px;color:var(--muted);font-size:.86rem;font-weight:500;width:100%;text-align:right;margin-bottom:.2rem;transition:.2s;background:none;}
.nav-item:hover{background:rgba(255,255,255,.04);color:var(--silver);}
.nav-item.active{background:var(--royal);color:#fff;}
.nav-item .ic{font-size:1rem;width:20px;text-align:center;}

#main{margin-right:240px;padding:2rem 2.5rem;max-width:980px;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.8rem;flex-wrap:wrap;gap:1rem;}
.topbar h1{color:var(--white);font-size:1.4rem;}
.topbar p{color:var(--muted);font-size:.82rem;margin-top:.2rem;}
.actions{display:flex;gap:.6rem;}
.btn{padding:.6rem 1.1rem;border-radius:8px;font-size:.84rem;font-weight:600;display:inline-flex;align-items:center;gap:.4rem;}
.btn-primary{background:linear-gradient(135deg,var(--royal),var(--sky));color:#fff;}
.btn-ghost{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--silver);}
.btn-danger{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
.btn-sm{padding:.4rem .8rem;font-size:.76rem;}

.card{background:var(--navy-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem;margin-bottom:1.2rem;}
.card h3{color:var(--white);font-size:.95rem;margin-bottom:.9rem;display:flex;align-items:center;justify-content:space-between;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.field{margin-bottom:.9rem;}
.field label{display:block;font-size:.74rem;color:var(--muted);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.03em;}
.field input,.field textarea,.field select{width:100%;background:var(--navy-2);border:1px solid var(--border);border-radius:7px;padding:.6rem .8rem;color:var(--white);font-size:.86rem;}
.field textarea{min-height:70px;resize:vertical;}
.lang-pill{display:inline-flex;background:rgba(255,255,255,.05);border-radius:99px;padding:2px;margin-bottom:1rem;}
.lang-pill button{padding:.35rem .9rem;border-radius:99px;font-size:.78rem;color:var(--muted);font-weight:600;}
.lang-pill button.active{background:var(--royal);color:#fff;}

.img-row{display:flex;align-items:center;gap:.8rem;}
.img-prev{width:54px;height:54px;border-radius:8px;background:var(--navy-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:1.4rem;flex-shrink:0;}
.img-prev img{width:100%;height:100%;object-fit:cover;}
.upload-btn{font-size:.76rem;padding:.45rem .8rem;}
.item-card{border:1px solid var(--border);border-radius:9px;padding:1rem;margin-bottom:.8rem;background:rgba(255,255,255,.015);}
.item-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.7rem;}
.item-head span{font-size:.8rem;color:var(--sky);font-weight:600;}
.hint{font-size:.74rem;color:var(--muted);line-height:1.6;margin-bottom:.8rem;}
.toast2{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--navy-card);border:1px solid var(--sky);color:var(--white);padding:.8rem 1.4rem;border-radius:9px;font-size:.85rem;transition:.3s;z-index:999;}
.toast2.show{transform:translateX(-50%) translateY(0);}
.section-hidden{display:none;}
.badge-count{background:rgba(56,189,248,.15);color:var(--sky);font-size:.68rem;padding:.1rem .5rem;border-radius:99px;}
@media(max-width:900px){ #sidebar{width:200px;} #main{margin-right:200px;padding:1.3rem;} .grid2{grid-template-columns:1fr;} }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="lm">UG</div>
    <h2>عبید گرافکس ایڈمن</h2>
    <p class="urdu">جاری رکھنے کے لیے لاگ ان کریں</p>
    <input type="text" id="loginUser" placeholder="Username"/>
    <input type="password" id="loginPass" placeholder="Password"/>
    <button onclick="doLogin()">Login</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- SHELL -->
<div id="adminShell">
  <div id="sidebar">
    <div class="sb-brand">
      <div class="lm">UG</div>
      <div><b>Ubaid Graphics</b><span>Admin Panel</span></div>
    </div>
    <button class="nav-item active" data-tab="branding"><span class="ic">🏷️</span> برانڈنگ / لوگو</button>
    <button class="nav-item" data-tab="hero"><span class="ic">🏠</span> ہوم / ہیرو سیکشن</button>
    <button class="nav-item" data-tab="services"><span class="ic">🎨</span> سروسز</button>
    <button class="nav-item" data-tab="portfolio"><span class="ic">🖼️</span> پورٹ فولیو</button>
    <button class="nav-item" data-tab="about"><span class="ic">👤</span> ہمارے بارے میں</button>

    <button class="nav-item" data-tab="contact"><span class="ic">📞</span> رابطہ کی معلومات</button>
    <div style="height:1px;background:var(--border);margin:1rem 0;"></div>
    <button class="nav-item" id="exportBtn" style="color:var(--green);"><span class="ic">💾</span> تبدیلیاں محفوظ کریں</button>
    <button class="nav-item" id="logoutBtn" style="color:#fca5a5;"><span class="ic">🚪</span> لاگ آؤٹ</button>
  </div>

  <div id="main">
    <div class="topbar">
      <div>
        <h1 id="pageTitle" class="urdu">برانڈنگ / لوگو</h1>
        <p class="urdu" id="modeHint">سرور سے جڑا ہوا ہے — "محفوظ کریں" دباتے ہی ویب سائٹ خود بخود اپڈیٹ ہو جائے گی</p>
      </div>
      <div class="actions">
        <button class="btn btn-ghost" id="resetBtn">🔄 ری سیٹ</button>
        <button class="btn btn-primary" id="exportBtn2">💾 محفوظ کریں</button>
      </div>
    </div>

    <div id="panels"></div>
  </div>
</div>

<div class="toast2" id="toast2">محفوظ ہو گیا ✅</div>

<input type="file" id="fileInput" accept="image/*" style="display:none"/>

const ADMIN_USER = 'ubaid';
const ADMIN_PASS = 'UbaidGraphics@2024';

let state = null;
let curTab = 'branding';
let langPick = {services:'ur', portfolio:'ur', testimonials:'ur', faq:'ur', about:'ur', hero:'ur', marquee:'ur', contact:'ur'};

function deepClone(o){ return JSON.parse(JSON.stringify(o)); }

async function loadState(){
  try {
    const res = await fetch('data.json?v='+Date.now());
    if(!res.ok) throw 0;
    state = await res.json();
  } catch(e){
    state = deepClone(DEFAULT_DATA);
  }
}

function showToast(msg){
  const t = document.getElementById('toast2');
  t.textContent = msg || 'محفوظ ہو گیا ✅';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ===== LOGIN ===== */
function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if(u === ADMIN_USER && p === ADMIN_PASS){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminShell').style.display = 'flex';
    boot();
  } else {
    document.getElementById('loginErr').textContent = 'غلط یوزر نیم یا پاس ورڈ';
  }
}
document.getElementById('loginPass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

document.getElementById('logoutBtn').onclick = () => {
  document.getElementById('adminShell').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
};

/* ===== NAV ===== */
const tabTitles = {
  branding:'برانڈنگ / لوگو', hero:'ہوم / ہیرو سیکشن', services:'سروسز', portfolio:'پورٹ فولیو',
  about:'ہمارے بارے میں', testimonials:'کلائنٹ جائزے', faq:'سوالات (FAQ)', contact:'رابطہ کی معلومات'
};

function boot(){
  loadState().then(()=>{
    document.querySelectorAll('.nav-item[data-tab]').forEach(b=>{
      b.onclick = () => { curTab = b.dataset.tab; setActiveNav(); renderTab(); };
    });
    setActiveNav();
    renderTab();
  });
}

function setActiveNav(){
  document.querySelectorAll('.nav-item[data-tab]').forEach(b=>b.classList.toggle('active', b.dataset.tab===curTab));
  document.getElementById('pageTitle').textContent = tabTitles[curTab];
}

document.getElementById('exportBtn').onclick = exportJSON;
document.getElementById('exportBtn2').onclick = exportJSON;
document.getElementById('resetBtn').onclick = () => {
  if(confirm('کیا آپ واقعی تمام تبدیلیاں ری سیٹ کرنا چاہتے ہیں؟ (یہ صرف اس ایڈیٹر میں ری سیٹ ہوگا)')){
    state = deepClone(DEFAULT_DATA);
    renderTab();
    showToast('ری سیٹ ہو گیا');
  }
};

async function exportJSON(){
  try {
    const res = await fetch('/api/save', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(state)
    });
    if(res.ok){
      showToast('✅ محفوظ ہو گیا — ویب سائٹ خود بخود اپڈیٹ ہو رہی ہے!');
      return;
    }
  } catch(e){ /* fall back to download */ }

  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'data.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('⬇️ data.json ڈاؤن لوڈ ہو گیا — اسے سائٹ کے فولڈر میں رکھیں');
}

/* ===== IMAGE PICKER HELPER ===== */
let pendingImageCallback = null;
document.getElementById('fileInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    if(pendingImageCallback) pendingImageCallback(ev.target.result);
    e.target.value = '';
  };
  reader.readAsDataURL(file);
});
function pickImage(cb){ pendingImageCallback = cb; document.getElementById('fileInput').click(); }

/* ===== RENDER DISPATCH ===== */
function renderTab(){
  const root = document.getElementById('panels');
  root.innerHTML = '';
  if(curTab==='branding') renderBranding(root);
  else if(curTab==='hero') renderHero(root);
  else if(curTab==='services') renderServices(root);
  else if(curTab==='portfolio') renderPortfolio(root);
  else if(curTab==='about') renderAbout(root);
  else if(curTab==='testimonials') renderTestimonials(root);
  else if(curTab==='faq') renderFAQ(root);
  else if(curTab==='contact') renderContact(root);
}

function langSwitcher(key, onchange){
  const wrap = document.createElement('div');
  wrap.className = 'lang-pill';
  ['ur','en'].forEach(l=>{
    const b = document.createElement('button');
    b.textContent = l==='ur' ? 'اردو' : 'English';
    b.className = langPick[key]===l ? 'active' : '';
    b.onclick = () => { langPick[key]=l; onchange(); };
    wrap.appendChild(b);
  });
  return wrap;
}

function field(label, value, oninput, type){
  const f = document.createElement('div'); f.className='field';
  const l = document.createElement('label'); l.textContent = label; f.appendChild(l);
  const inp = (type==='textarea') ? document.createElement('textarea') : document.createElement('input');
  if(type && type!=='textarea') inp.type = type;
  inp.value = value || '';
  inp.oninput = (e)=>oninput(e.target.value);
  f.appendChild(inp);
  return f;
}

function imageField(label, value, onchange){
  const f = document.createElement('div'); f.className='field';
  const l = document.createElement('label'); l.textContent = label; f.appendChild(l);
  const row = document.createElement('div'); row.className='img-row';
  const prev = document.createElement('div'); prev.className='img-prev';
  prev.innerHTML = value ? `<img src="${value}"/>` : '🖼️';
  const btn = document.createElement('button'); btn.className='btn btn-ghost upload-btn'; btn.textContent='📤 تصویر منتخب کریں';
  btn.onclick = () => pickImage(v => { onchange(v); prev.innerHTML = `<img src="${v}"/>`; });
  const rm = document.createElement('button'); rm.className='btn btn-ghost upload-btn'; rm.textContent='✕ ہٹائیں';
  rm.onclick = () => { onchange(''); prev.innerHTML='🖼️'; };
  row.appendChild(prev); row.appendChild(btn); row.appendChild(rm);
  f.appendChild(row);
  return f;
}

/* ===== BRANDING ===== */
function renderBranding(root){
  const b = state.branding;
  const c = document.createElement('div'); c.className='card';
  c.innerHTML = `<h3>لوگو اور برانڈ</h3>`;
  c.appendChild(imageField('لوگو تصویر (اپلوڈ کریں)', b.logoImage, v=>{ b.logoImage=v; }));
  c.appendChild(field('لوگو ٹیکسٹ (اگر تصویر نہ ہو تو یہ دکھایا جائے گا)', b.logoText, v=>b.logoText=v));
  c.appendChild(field('برانڈ کا نام', b.brandName, v=>b.brandName=v));
  root.appendChild(c);

  const c2 = document.createElement('div'); c2.className='card';
  c2.innerHTML = `<h3>رابطہ نمبرز اور لنکس</h3>`;
  c2.appendChild(field('واٹس ایپ نمبر (کنٹری کوڈ کے ساتھ، بغیر + کے)', b.whatsapp, v=>b.whatsapp=v));
  c2.appendChild(field('فون نمبر', b.phone, v=>b.phone=v));
  c2.appendChild(field('ای میل', b.email, v=>b.email=v));
  const g = document.createElement('div'); g.className='grid2';
  g.appendChild(field('فیس بک لنک', b.facebook, v=>b.facebook=v));
  g.appendChild(field('انسٹاگرام لنک', b.instagram, v=>b.instagram=v));
  c2.appendChild(g);
  c2.appendChild(field('لنکڈ ان لنک', b.linkedin, v=>b.linkedin=v));
  root.appendChild(c2);
}
